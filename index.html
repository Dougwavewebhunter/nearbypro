<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join as Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {font-family: Arial; padding:20px; background:#f4f6f9;}
form {background:#fff; padding:20px; border-radius:10px; max-width:500px; margin:auto;}
input, select {width:100%; padding:10px; margin:8px 0;}
button {padding:12px; background:#F47A20; color:#fff; border:none; cursor:pointer;}
</style>
</head>

<body>

<h2>Join as a Pro</h2>

<form id="joinForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>

<label>Portfolio Photos</label>
<input type="file" id="portfolioUpload" multiple>

<label>Certificates</label>
<input type="file" id="certUpload" multiple>

<h3>Bank Details</h3>

<select id="bankName">
<option>FNB</option>
<option>Standard Bank</option>
<option>ABSA</option>
<option>Nedbank</option>
</select>

<input type="text" id="accountNumber" placeholder="Account Number">
<input type="text" id="accountName" placeholder="Account Name">
<input type="text" id="branchCode" placeholder="Branch Code">

<label><input type="radio" name="paymentMethod" value="bank" checked> Bank</label>
<label><input type="radio" name="paymentMethod" value="phone"> Phone EFT</label>

<input type="text" id="phonePayment" placeholder="Phone for EFT">

<button type="submit">Submit</button>
</form>

<script>
const supabase = window.supabase.createClient(
  "https://gwcwrimntftpidnpcbcr.supabase.co",
  "sb_publishable_aLGKe82qd3aw0-MGEaq3pg_RxnLDKmh"
);

async function uploadFiles(files, folder) {
  const urls = [];
  for (let file of files) {
    const filePath = folder + "/" + Date.now() + "_" + file.name;
    const { error } = await supabase.storage.from('uploads').upload(filePath, file);
    if (!error) {
      const { data } = supabase.storage.from('uploads').getPublicUrl(filePath);
      urls.push(data.publicUrl);
    }
  }
  return urls;
}

document.getElementById("joinForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const portfolio = await uploadFiles(document.getElementById("portfolioUpload").files, "portfolio");
  const certs = await uploadFiles(document.getElementById("certUpload").files, "certs");

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    portfolio: portfolio,
    certificates: certs,
    payment_method: document.querySelector("input[name='paymentMethod']:checked").value,
    bank_name: document.getElementById("bankName").value,
    account_number: document.getElementById("accountNumber").value,
    account_name: document.getElementById("accountName").value,
    branch_code: document.getElementById("branchCode").value,
    phone_payment: document.getElementById("phonePayment").value
  };

  const { error } = await supabase.from("providers").insert([data]);

  if (error) {
    alert("Error: " + error.message);
  } else {
    alert("Submitted successfully!");
  }
});
</script>

</body>
</html>
